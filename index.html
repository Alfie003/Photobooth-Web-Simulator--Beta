<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Photobooth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <div class="header">
      <h1>✦ photobooth ✦</h1>
      <p>cute photos, no login needed &middot; everything stays on your device</p>
    </div>

    <div class="main-layout">

      <!-- Camera Section -->
      <div class="camera-section">
        <div class="camera-wrap" id="cameraWrap">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay-canvas"></canvas>
          <div class="countdown-overlay" id="countdown"></div>
          <div class="flash-overlay" id="flash"></div>

          <div class="camera-placeholder" id="placeholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="1.5" aria-hidden="true">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <p>Click "Start camera" to begin<br />No photos leave your device</p>
            <button class="btn-capture" style="max-width:180px" id="btnStart">Start camera</button>
          </div>
        </div>

        <div class="camera-bar" id="cameraBar">
          <div class="shot-counter" id="shotCounter">0 / 4 photos</div>
          <button class="btn-retake" id="btnRetake" disabled>Retake</button>
          <button class="btn-capture" id="btnCapture" disabled>📸 Start shooting</button>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">

        <div class="panel">
          <div class="panel-title">Layout</div>
          <div class="layout-grid" id="layoutGrid"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Timer</div>
          <div class="timer-btns" id="timerBtns"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Filter</div>
          <div class="filter-scroll" id="filterGrid"></div>
        </div>

      </div>
    </div>

    <!-- Strip / Collage Preview -->
    <div class="strip-section" id="stripSection">
      <div class="strip-header">
        <span class="strip-title">✦ your photos</span>
        <div class="strip-actions">
          <button class="btn-clear" id="btnClear">Clear</button>
          <button class="btn-download" id="btnDownload">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
        </div>
      </div>
      <div id="collagePreview"></div>
    </div>

  </div>

  <!-- Hidden canvas for export -->
  <canvas id="final-canvas" style="display:none"></canvas>

  <script src="script.js"></script>
</body>
</html>
